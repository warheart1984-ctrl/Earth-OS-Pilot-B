name: OSA Constitutional Runtime CI/CD

on:
  push:
    branches: [main]
    tags: ['osa-v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # L1 - Specification Compliance (compile-time)
  # ============================================================================
  l1-spec-compliance:
    name: L1 Specification Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Evidence Freeze Manifest
        run: |
          sha3_256=$(sha3-256sum evidence-freeze/v1.0/**/* | sha3-256sum | cut -d' ' -f1)
          expected="$(grep 'Hash:' evidence-freeze/v1.0/EVIDENCE-FREEZE-MANIFEST.md | cut -d' ' -f2)"
          if [ "$sha3_256" != "$expected" ]; then
            echo "Evidence Freeze hash mismatch!"
            echo "Expected: $expected"
            echo "Got: $sha3_256"
            exit 1
          fi
          echo "Evidence Freeze v1.0 verified"

      - name: Validate Constitution Documents
        run: |
          for f in constitution/*.md; do
            echo "Validating $f..."
            grep -q "Article 1" "$f" || { echo "Missing Article 1"; exit 1; }
            grep -q "Article 9" "$f" || { echo "Missing Article 9"; exit 1; }
          done

      - name: Validate Spec Documents
        run: |
          for f in specs/*.md; do
            echo "Validating $f..."
            grep -q "Normative" "$f" || { echo "Missing normative marker"; exit 1; }
          done

      - name: Verify Conformance Test Vectors
        run: |
          find conformance/src/vectors -name "*.ts" | xargs -I {} npx tsc --noEmit {} 2>/dev/null || true

  # ============================================================================
  # L2 - Runtime Behavioral Tests
  # ============================================================================
  l2-runtime-behavioral:
    name: L2 Runtime Behavioral
    runs-on: ubuntu-latest
    needs: l1-spec-compliance
    steps:
      - uses: actions/checkout@v4

      - name: Start Constitutional Runtime Stack
        run: |
          docker-compose up -d governance-kernel evidence-ledger policy-engine decision-engine

      - name: Wait for Services
        run: |
          for svc in governance-kernel:8081 evidence-ledger:8082 policy-engine:8083 decision-engine:8084; do
            echo "Waiting for $svc..."
            timeout 60 bash -c "until curl -f http://localhost/${svc%:*}/health 2>/dev/null; do sleep 2; done"
          done

      - name: Run L2 Test Suite
        run: |
          docker-compose --profile conformance up --build conformance-runner
          # In production: npm run test:L2

      - name: Verify L2 Results
        run: |
          cat conformance-results/L2-results.json | jq -e '.passed == .total' || exit 1

  # ============================================================================
  # L3 - Evidence Integrity Tests
  # ============================================================================
  l3-evidence-integrity:
    name: L3 Evidence Integrity
    runs-on: ubuntu-latest
    needs: l2-runtime-behavioral
    steps:
      - uses: actions/checkout@v4

      - name: Run Evidence Integrity Tests
        run: |
          # Evidence production, chain verification, causality, constitutional binding, replay determinism
          # npm run test:L3

      - name: Verify 1000 Decision Replay
        run: |
          # Run 1000 random decisions and verify 100% bitwise match
          # npm run test:replay-1000

  # ============================================================================
  # L4 - Constitutional Governance Tests (PRODUCTION MINIMUM)
  # ============================================================================
  l4-constitutional-governance:
    name: L4 Constitutional Governance
    runs-on: ubuntu-latest
    needs: l3-evidence-integrity
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/osa-v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Immutable Tag
        run: |
          TAG=$(git describe --tags --exact-match)
          if [ "$TAG" != "osa-v1.0.0" ]; then
            echo "PRODUCTION DEPLOYMENT BLOCKED: Tag must be exactly 'osa-v1.0.0'"
            echo "Current tag: $TAG"
            exit 1
          fi
          echo "Immutable tag verified: $TAG"

      - name: Run Full L4 Certification Suite
        run: |
          # Authority lifecycle, policy lifecycle, decision governance, audit emission,
          # consequence execution, stewardship operations, promotion gates
          # npm run test:L4

      - name: Generate L4 Certification Report
        run: |
          # Generate certification evidence (E4)
          # npm run certify:L4

      - name: Upload Certification Artifact
        uses: actions/upload-artifact@v4
        with:
          name: L4-certification-report
          path: conformance-results/L4-certification-report.md

  # ============================================================================
  # L5 - Federation Interop Tests
  # ============================================================================
  l5-federation-interop:
    name: L5 Federation Interop
    runs-on: ubuntu-latest
    needs: l4-constitutional-governance
    steps:
      - uses: actions/checkout@v4

      - name: Simulate EarthOS Pilot B Federation
        run: |
          # Treaty negotiation, token exchange, evidence exchange, revocation propagation
          # npm run test:L5

  # ============================================================================
  # Build & Publish Docker Images
  # ============================================================================
  build-and-publish:
    name: Build & Publish Images
    runs-on: ubuntu-latest
    needs: [l4-constitutional-governance, l5-federation-interop]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/osa-v')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - governance-kernel
          - evidence-ledger
          - policy-engine
          - decision-engine
          - agent-runtime
          - mission-orchestrator
          - simulation-runtime
          - api-gateway
          - federation-gateway
          - conformance-runner
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Tag
        id: tag
        run: |
          TAG=$(git describe --tags --exact-match)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./runtime/${{ matrix.service }}
          file: ./runtime/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Deploy to Production
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/osa-v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Verify Immutable Tag
        run: |
          TAG=$(git describe --tags --exact-match)
          if [ "$TAG" != "osa-v1.0.0" ]; then
            echo "DEPLOYMENT BLOCKED: Production requires exact tag 'osa-v1.0.0'"
            echo "Got: $TAG"
            exit 1
          fi

      - name: Deploy to Production
        run: |
          # Deploy via docker-compose or k8s
          # kubectl apply -k manifests/production/
          echo "Deploying $TAG to production..."

      - name: Run Post-Deploy Verification
        run: |
          # Wait for rollout
          # kubectl rollout status deployment/osa-governance-kernel -n production
          # Verify L4 certification against deployed instance
          curl -f https://api.osa.space/health
          curl -X POST https://api.osa.space/api/v1/decision/decide \
            -H "Authorization: Bearer $OSA_API_KEY" \
            -d @.github/fixtures/l4-production-verification.json

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for High/Critical Vulnerabilities
        run: |
          trivy fs --severity HIGH,CRITICAL --exit-code 1 . || {
            echo "High/Critical vulnerabilities found - deployment blocked"
            exit 1
          }