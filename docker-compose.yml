version: '3.8'

services:
  # ============================================================================
  # Constitutional Runtime (Layer 3) - P0 Core
  # ============================================================================

  governance-kernel:
    build:
      context: ./runtime/governance-kernel
      dockerfile: Dockerfile
    container_name: osa-governance-kernel
    ports:
      - "8081:8081"
    environment:
      - KERNEL_ID=gk-01
      - SIGNING_KEY_PATH=/keys/signing.key
      - VERIFYING_KEY_PATH=/keys/verifying.key.pub
      - EVIDENCE_LEDGER_URL=http://evidence-ledger:8082
      - POLICY_ENGINE_URL=http://policy-engine:8083
      - AUDIT_ENGINE_URL=http://audit-engine:8084
    volumes:
      - ./keys:/keys:ro
      - governance-kernel-data:/data
    networks:
      - osa-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  evidence-ledger:
    build:
      context: ./runtime/evidence-ledger
      dockerfile: Dockerfile
    container_name: osa-evidence-ledger
    ports:
      - "8082:8082"
    environment:
      - DATA_DIR=/data/ledger
      - CHECKPOINT_INTERVAL=10000
      - PARTITION_BY_LEVEL=true
    volumes:
      - evidence-ledger-data:/data/ledger
    networks:
      - osa-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  policy-engine:
    build:
      context: ./runtime/policy-engine
      dockerfile: Dockerfile
    container_name: osa-policy-engine
    ports:
      - "8083:8083"
    environment:
      - WASM_CACHE_DIR=/cache/wasm
      - OPA_BINARY_PATH=/usr/bin/opa
    volumes:
      - policy-engine-cache:/cache/wasm
    networks:
      - osa-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  decision-engine:
    build:
      context: ./runtime/decision-engine
      dockerfile: Dockerfile
    container_name: osa-decision-engine
    ports:
      - "8084:8084"
    environment:
      - KERNEL_URL=http://governance-kernel:8081
      - POLICY_ENGINE_URL=http://policy-engine:8083
      - EVIDENCE_LEDGER_URL=http://evidence-ledger:8082
      - AUDIT_ENGINE_URL=http://audit-engine:8084
    networks:
      - osa-network
    depends_on:
      - governance-kernel
      - policy-engine
      - evidence-ledger
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ============================================================================
  # Platform Runtime (Layer 3) - P1
  # ============================================================================

  agent-runtime:
    build:
      context: ./runtime/agent-runtime
      dockerfile: Dockerfile
    container_name: osa-agent-runtime
    ports:
      - "8085:8085"
    environment:
      - KERNEL_URL=http://governance-kernel:8081
      - DECISION_ENGINE_URL=http://decision-engine:8084
      - EVIDENCE_LEDGER_URL=http://evidence-ledger:8082
    networks:
      - osa-network
    depends_on:
      - governance-kernel
      - decision-engine
      - evidence-ledger
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  mission-orchestrator:
    build:
      context: ./runtime/mission-orchestrator
      dockerfile: Dockerfile
    container_name: osa-mission-orchestrator
    ports:
      - "8086:8086"
    environment:
      - KERNEL_URL=http://governance-kernel:8081
      - DECISION_ENGINE_URL=http://decision-engine:8084
      - EVIDENCE_LEDGER_URL=http://evidence-ledger:8082
      - AUDIT_ENGINE_URL=http://audit-engine:8084
    networks:
      - osa-network
    depends_on:
      - governance-kernel
      - decision-engine
      - evidence-ledger
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  simulation-runtime:
    build:
      context: ./runtime/simulation-runtime
      dockerfile: Dockerfile
    container_name: osa-simulation-runtime
    ports:
      - "8087:8087"
    environment:
      - KERNEL_URL=http://governance-kernel:8081
      - DECISION_ENGINE_URL=http://decision-engine:8084
      - EVIDENCE_LEDGER_URL=http://evidence-ledger:8082
      - AUDIT_ENGINE_URL=http://audit-engine:8084
      - CHECKPOINT_INTERVAL=100
    networks:
      - osa-network
    depends_on:
      - governance-kernel
      - decision-engine
      - evidence-ledger
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # ============================================================================
  # Layer 4 Intelligence Services - API Gateway
  # ============================================================================

  api-gateway:
    build:
      context: ./api/gateway
      dockerfile: Dockerfile
    container_name: osa-api-gateway
    ports:
      - "8080:8080"
    environment:
      - KERNEL_ENDPOINT=http://governance-kernel:8081
      - LEDGER_ENDPOINT=http://evidence-ledger:8082
      - DECISION_ENDPOINT=http://decision-engine:8084
      - AGENT_ENDPOINT=http://agent-runtime:8085
      - MISSION_ENDPOINT=http://mission-orchestrator:8086
      - SIMULATION_ENDPOINT=http://simulation-runtime:8087
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - CORS_ORIGINS=*
    networks:
      - osa-network
    depends_on:
      - governance-kernel
      - evidence-ledger
      - decision-engine
      - agent-runtime
      - mission-orchestrator
      - simulation-runtime
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================================================
  # Conformance Suite
  # ============================================================================

  conformance-runner:
    build:
      context: ./conformance
      dockerfile: Dockerfile
    container_name: osa-conformance-runner
    environment:
      - KERNEL_ENDPOINT=http://governance-kernel:8081
      - LEDGER_ENDPOINT=http://evidence-ledger:8082
      - POLICY_ENDPOINT=http://policy-engine:8083
      - DECISION_ENDPOINT=http://decision-engine:8084
      - AGENT_ENDPOINT=http://agent-runtime:8085
      - MISSION_ENDPOINT=http://mission-orchestrator:8086
      - SIMULATION_ENDPOINT=http://simulation-runtime:8087
      - FEDERATION_ENDPOINT=http://federation-gateway:8088
      - AUTH_TOKEN=${CONFORMANCE_AUTH_TOKEN}
      - OUTPUT_DIR=/results
    volumes:
      - conformance-results:/results
    networks:
      - osa-network
    profiles:
      - conformance
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

networks:
  osa-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  governance-kernel-data:
  evidence-ledger-data:
  policy-engine-cache:
  conformance-results: